run:
  timeout: 5m
  go: "1.26"

linters:
  disable-all: true
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - gosec
    - misspell
    - revive
    - bodyclose
    - nilerr
    - rowserrcheck

issues:
  exclude-dirs:
    - internal/gen
  exclude-rules:
    - path: _test\.go
      linters:
        - gosec
