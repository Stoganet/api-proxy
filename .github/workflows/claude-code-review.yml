name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  workflow_dispatch:

jobs:
  claude-review:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434 # v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Read CLAUDE.md first, then review this pull request.

            Post inline comments ONLY for issues that must be fixed before merging:
            - Bugs or logic errors in Go code
            - Security vulnerabilities (auth bypass, JWT misuse, injection, secret exposure, unvalidated input crossing trust boundaries)
            - Violations of architecture invariants documented in CLAUDE.md (e.g. import cycles between internal packages, auth package importing jellyfin package)
            - Broken or unsafe deploy/rollback logic

            Do NOT comment on:
            - Go formatting or style — golangci-lint already enforces this in CI
            - Generated code under internal/gen/ — oapi-codegen output, not hand-written
            - Subjective preferences or minor readability suggestions
            - Hypothetical future concerns without concrete evidence
            - Missing tests beyond what the plan specifies

            After reviewing, post a single top-level summary comment:
            - If must-fix issues were found: list them briefly
            - If no must-fix issues were found: explicitly state the PR looks good

            Do not manufacture issues to appear thorough.
          claude_args: |
            --max-turns 20
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Grep,Glob"
